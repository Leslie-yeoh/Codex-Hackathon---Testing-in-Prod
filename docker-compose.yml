services:
  backend:
    build:
      context: .
      dockerfile: codex_backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./codex_backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./legacy-bridge
      args:
        NEXT_PUBLIC_LEGACY_BRIDGE_API_BASE_URL: ${NEXT_PUBLIC_LEGACY_BRIDGE_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_MOCK_DISPLAY_ACTIONS: "false"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"